<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - TechPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6C63FF;
            --secondary-color: #FF6584;
            --bg-color: #0a0a23;
            --text-color: #ffffff;
            --card-color: #1a1a3e;
            --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            opacity: 0.1;
            z-index: -1;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            opacity: 0.2;
            animation: float 8s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary-color);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
            opacity: 0.2;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        /* Left Side - Info */
        .login-info {
            color: var(--text-color);
        }

        .login-info h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-info p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .features {
            list-style: none;
        }

        .features li {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .features i {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-left: 15px;
            min-width: 30px;
        }

        /* Right Side - Form */
        .login-form-container {
            background: var(--card-color);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .form-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group label i {
            color: var(--primary-color);
            margin-left: 8px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: var(--bg-color);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(108, 99, 255, 0.05);
            box-shadow: 0 0 15px rgba(108, 99, 255, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: var(--primary-color);
            pointer-events: none;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .remember-forgot a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        .remember-forgot a:hover {
            color: var(--secondary-color);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(108, 99, 255, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(108, 99, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: var(--secondary-color);
        }

        /* Social Login */
        .social-login {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-login p {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-color);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background: rgba(108, 99, 255, 0.1);
        }

        .social-btn i {
            margin-left: 8px;
        }

        /* Alert */
        .alert {
            display: none;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.1);
            border-left: 4px solid #f44336;
            color: #ff6b6b;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4CAF50;
            color: #51cf66;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .login-info {
                text-align: center;
            }

            .login-info h1 {
                font-size: 2rem;
            }

            .login-form-container {
                padding: 40px 30px;
            }

            .features li {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="login-wrapper">
        <!-- Left Side -->
        <div class="login-info">
            <h1>مرحباً بك في TechPro</h1>
            <p>منصة موثوقة لإدارة حسابك والاستمتاع بخدماتنا المتميزة</p>
            <ul class="features">
                <li><i class="fas fa-check-circle"></i> خدمات عالية الجودة</li>
                <li><i class="fas fa-check-circle"></i> دعم فني 24/7</li>
                <li><i class="fas fa-check-circle"></i> أمان وحماية بيانات</li>
                <li><i class="fas fa-check-circle"></i> واجهة سهلة الاستخدام</li>
            </ul>
        </div>

        <!-- Right Side - Form -->
        <div class="login-form-container">
            <div class="form-header">
                <h2>تسجيل الدخول</h2>
                <p>أدخل بيانات حسابك للمتابعة</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="margin: 0;">تذكرني</label>
                    </div>
                    <a href="#forgot">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>

                <div class="signup-link">
                    ليس لديك حساب؟ <a href="#signup">إنشاء حساب جديد</a>
                </div>
            </form>

            <div class="social-login">
                <p>أو قم بتسجيل الدخول عبر:</p>
                <div class="social-buttons">
                    <button class="social-btn"><i class="fab fa-google"></i>Google</button>
                    <button class="social-btn"><i class="fab fa-facebook-f"></i>Facebook</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Simulated login
            if (email && password.length >= 6) {
                // Store user session
                sessionStorage.setItem('userLoggedIn', 'true');
                sessionStorage.setItem('userEmail', email);
                
                if (remember) {
                    localStorage.setItem('userEmail', email);
                }
                
                showAlert('تم تسجيل الدخول بنجاح!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showAlert('البريد والرمز غير صحيح. يرجى المحاولة مجددا', 'error');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 3000);
            }
        }

        // Check if user is already logged in
        if (sessionStorage.getItem('userLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        // Load saved email if remember was checked
        if (localStorage.getItem('userEmail')) {
            document.getElementById('email').value = localStorage.getItem('userEmail');
            document.getElementById('remember').checked = true;
        }
    </script>
</body>
</html>
